            background:'none',borderBottom:`2px solid ${tab===t2.id?'var(--blue2)':'transparent'}`,
            marginBottom:-1,transition:'all .15s',whiteSpace:'nowrap'}}>
          {t2.label}
          {t2.count > 0 && (
            <span style={{fontFamily:'monospace',fontSize:10,padding:'0 5px',borderRadius:4,
              background:t2.danger?'var(--red)':tab===t2.id?'var(--blue)':'var(--bg3)',
              color:t2.danger||tab===t2.id?'#fff':'var(--t2)'}}>
              {t2.count}
            </span>
          )}
        </button>
      ))}
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  // ── Core state ──────────────────────────────────────────────────────────────
  const [tab, setTab] = useState('home');
  const [projects, setProjects] = useState([]);
  const [activePid, setActivePid] = useState('');
  const [project, setProject] = useState(null);
  const [stats, setStats] = useState({});
  const [username, setUsername] = useState(()=>localStorage.getItem('nexus-username')||'');
  const [showUserModal, setShowUserModal] = useState(true);
  const [allCollaborators, setAllCollaborators] = useState([]);

  // ── UI state ─────────────────────────────────────────────────────────────────
  const [sidebarCollapsed, setSidebarCollapsed] = useState(()=>localStorage.getItem('nexus-sidebar-collapsed')==='true');
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const [showA11yPanel, setShowA11yPanel] = useState(false);
  const [showUpload, setShowUpload] = useState(false);
  const [showCreateProject, setShowCreateProject] = useState(false);
  const [toasts, setToasts] = useState([]);

  // ── A11y ─────────────────────────────────────────────────────────────────────
  const [a11y, setA11yRaw] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('nexus-a11y')||'{}'); } catch { return {}; }
  });
  const [a11y2] = useState({ theme:'dark', dyslexia:false, tts:false, rtl:false, lang:'en',
    fontSize:14, expertise:'intermediate', reducedMotion:false });
  const setA11y = (updater) => setA11yRaw(prev => {
    const next = typeof updater==='function' ? updater(prev) : updater;
    const merged = {...a11y2,...prev,...next};
    localStorage.setItem('nexus-a11y', JSON.stringify(merged));
    return merged;
  });
  const a11yFull = { ...a11y2, ...a11y };

  // ── Roles & prefs ───────────────────────────────────────────────────────────
  const [viewRole, setViewRole] = useState('student');
  const t = useCallback((key) => (TRANSLATIONS[a11yFull.lang]||TRANSLATIONS.en)[key]||key, [a11yFull.lang]);

  // ── Library state ───────────────────────────────────────────────────────────
  const [selectedHash, setSelectedHash] = useState(null);
  const [selectedPaper, setSelectedPaper] = useState(null);
  const [analysing, setAnalysing] = useState(false);
  const [compareSelected, setCompareSelected] = useState([]);
  const [compareMode, setCompareMode] = useState(false);
  const [compareResult, setCompareResult] = useState(null);
  const [comparing, setComparing] = useState(false);

  // ── Chat state ──────────────────────────────────────────────────────────────
  const [chatLoading, setChatLoading] = useState(false);
  const [useWebSearch, setUseWebSearch] = useState(false);

  // ── Insights state ──────────────────────────────────────────────────────────
  const [gapResult, setGapResult] = useState(null);
  const [gapLoading, setGapLoading] = useState(false);

  // ── Collab state ─────────────────────────────────────────────────────────────
  const [collisions, setCollisions] = useState([]);
  const [collisionLoading, setCollisionLoading] = useState(false);
  const [heatmapData, setHeatmapData] = useState([]);
  const [heatmapMonths, setHeatmapMonths] = useState([]);

  // ── Diagrams state ──────────────────────────────────────────────────────────
  const [diagramType, setDiagramType] = useState('flowchart');
  const [diagramHash, setDiagramHash] = useState(null);
  const [diagramCode, setDiagramCode] = useState('');
  const [diagramLoading, setDiagramLoading] = useState(false);

  // ── Deconstructor state ──────────────────────────────────────────────────────
  const [deconInput, setDeconInput] = useState('');
  const [deconResult, setDeconResult] = useState(null);
  const [deconLoading, setDeconLoading] = useState(false);
  const [deconLevel, setDeconLevel] = useState('intermediate');

  // ── Upload state ─────────────────────────────────────────────────────────────
  const [uploadQueue, setUploadQueue] = useState([]);

  // ── Feedback state ───────────────────────────────────────────────────────────
  const [feedbackSubmitted, setFeedbackSubmitted] = useState({});
  const [feedbackStats, setFeedbackStats] = useState(null);
  const [feedbackSummary, setFeedbackSummary] = useState(null);
  const [feedbackSummaryLoading, setFeedbackSummaryLoading] = useState(false);

  // ── Toast helper ─────────────────────────────────────────────────────────────
  const showToast = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 4000);
  },[]);

  // ── Apply theme/a11y to document ─────────────────────────────────────────────
  useEffect(()=>{
    const el = document.documentElement;
    el.classList.toggle('light', a11yFull.theme==='light');
    el.classList.toggle('hc', a11yFull.theme==='high-contrast');
    document.body.style.fontSize = a11yFull.fontSize+'px';
    document.body.classList.toggle('dyslexic', a11yFull.dyslexia);
    document.body.classList.toggle('reduced-motion', a11yFull.reducedMotion);
  },[a11yFull.theme, a11yFull.fontSize, a11yFull.dyslexia, a11yFull.reducedMotion]);

  // ── Sync mermaid theme ────────────────────────────────────────────────────────
  useEffect(()=>{
    if(window.mermaid) {
      window.mermaid.initialize({ startOnLoad:false, theme:'base',
        themeVariables:{ darkMode:a11yFull.theme==='dark', background:a11yFull.theme==='dark'?'#03070F':'#FCFCFC' }});
    }
  },[a11yFull.theme]);

  // ── Init ─────────────────────────────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      await loadProjects();
      setShowUserModal(true);
      if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) {
        setA11y(p=>({...p,reducedMotion:true}));
      }
    })();
  },[]);

  // ── API: Projects ─────────────────────────────────────────────────────────────
  const loadProjects = async () => {
    try {
      const r = await fetch('/api/projects');
      const data = await r.json();
      setProjects(data);
      // Collect all collaborators across projects
      const seen = {};
      for(const p of data) {
        for(const [name,c] of Object.entries(p.collaborators||{})) {
          if(!seen[name]) seen[name]={...c,username:name,projectCount:0};
          seen[name].projectCount=(seen[name].projectCount||0)+1;
        }
      }
      setAllCollaborators(Object.values(seen).sort((a,b)=>b.projectCount-a.projectCount));
    } catch { setProjects([]); }
  };

  const loadProject = async (pid) => {
    if(!pid) { setProject(null); setStats({}); return; }
    const r = await fetch(`/api/projects/${pid}`);
    const data = await r.json();
    setProject(data);
    const sr = await fetch(`/api/projects/${pid}/stats`);
    setStats(await sr.json());
    buildHeatmap(data);
    loadUserPreferences(pid);
  };

  const onProjectChange = async (pid) => {
    const newPid = pid !== undefined ? pid : activePid;
    setSelectedHash(null); setSelectedPaper(null);
    setCompareResult(null); setGapResult(null);
    setDiagramCode(''); setCollisions([]); setFeedbackSubmitted({});
    const el = document.getElementById('mermaid-output');
    if(el) el.innerHTML='';
    await loadProject(newPid);
    if(tab==='home') setTab('dashboard');
  };

  const enterProject = (pid) => { setActivePid(pid); onProjectChange(pid).then(()=>setTab('dashboard')); };

  const createProject = async (form) => {
    const r = await fetch('/api/projects',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
    const proj = await r.json();
    setShowCreateProject(false);
    await loadProjects();
    setActivePid(proj.id);
    await loadProject(proj.id);
    setTab('dashboard');
    showToast('Project created successfully','success');
  };

  const syncPreferences = async () => {
    if(!activePid||!username) return;
    try {
      await fetch(`/api/projects/${activePid}/users/${encodeURIComponent(username)}/preferences`,{
        method:'PATCH',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({language:a11yFull.lang,role:viewRole,expertise:a11yFull.expertise})
      });
    } catch {}
  };

  const loadUserPreferences = async (pid) => {
    if(!pid||!username) return;
    try {
      const r = await fetch(`/api/projects/${pid}/users/${encodeURIComponent(username)}/preferences`);
      if(r.ok) {
        const data = await r.json();
        if(data.language) setA11y(p=>({...p,lang:data.language}));
        if(data.role) setViewRole(data.role);
        if(data.expertise) setA11y(p=>({...p,expertise:data.expertise}));
      }
    } catch {}
  };

  const refreshProject = async () => {
    if(!activePid) return;
    const r = await fetch(`/api/projects/${activePid}`);
    const data = await r.json();
    setProject(data);
    if(selectedHash) setSelectedPaper(data.papers?.[selectedHash]||null);
    const sr = await fetch(`/api/projects/${activePid}/stats`);
    setStats(await sr.json());
    buildHeatmap(data);
  };

  // ── API: Upload ───────────────────────────────────────────────────────────────
  const uploadFiles = async (files) => {
    if(!activePid){ showToast('Select a project first','error'); return; }
    for(const file of files) {
      const item = {name:file.name,status:'Uploading…',pct:15};
      setUploadQueue(q=>[...q,item]);
      try {
        const fd = new FormData(); fd.append('file',file);
        const r = await fetch(`/api/projects/${activePid}/papers/upload?username=${encodeURIComponent(username)}`,
          {method:'POST',body:fd});
        const result = await r.json();
        if(result.status==='success') {
          showToast(`"${result.title}" uploaded`,'success');
        } else if(result.status==='skipped') {
          showToast('Paper already exists in project','info');
        } else {
          showToast('Upload failed: '+(result.reason||'unknown'),'error');
        }
      } catch { showToast('Upload failed — check connection','error'); }
    }
    await refreshProject();
    setTimeout(()=>setUploadQueue([]),4000);
  };

  // ── API: Paper actions ────────────────────────────────────────────────────────
  const analysePaper = async () => {
    if(!selectedHash) return;
    setAnalysing(true);
    showToast('Analysing paper — this may take 30–90 seconds','info');
    try {
      const r = await fetch(
        `/api/projects/${activePid}/papers/${selectedHash}/summarize` +
        `?username=${encodeURIComponent(username)}&language=${a11yFull.lang}&role=${viewRole}&expertise=${a11yFull.expertise}`,
        {method:'POST'});
      if(!r.ok){ const d=await r.json(); showToast('Analysis failed: '+(d.detail||r.status),'error'); setAnalysing(false); return; }
      await refreshProject();
      showToast('Analysis complete','success');
    } catch(e){ showToast('Analysis failed: '+e.message,'error'); }
    setAnalysing(false);
  };

  const deletePaper = async () => {
    if(!selectedHash||!confirm('Delete this paper and all its data?')) return;
    await fetch(`/api/projects/${activePid}/papers/${selectedHash}`,{method:'DELETE'});
    setSelectedHash(null); setSelectedPaper(null);
    await refreshProject();
    showToast('Paper deleted','success');
  };

  const addAnnotation = async (text) => {
    if(!text.trim()||!selectedHash) return;
    await fetch(`/api/projects/${activePid}/papers/${selectedHash}/annotations`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({username,text:text.trim()})});
    await refreshProject();
  };

  const deleteAnnotation = async (annId) => {
    await fetch(`/api/projects/${activePid}/papers/${selectedHash}/annotations/${annId}`,{method:'DELETE'});
    await refreshProject();
  };

  // ── API: Chat ─────────────────────────────────────────────────────────────────
  const sendChat = async (msg) => {
    if(!msg.trim()||chatLoading) return;
    setChatLoading(true);
    try {
      await fetch(`/api/projects/${activePid}/chat`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:msg,username,use_web:useWebSearch,
          language:a11yFull.lang,role:viewRole,expertise:a11yFull.expertise})
      });
      await refreshProject();
    } catch{ showToast('Chat error — try again','error'); }
    setChatLoading(false);
  };

  // ── API: Insights ─────────────────────────────────────────────────────────────
  const runGapAnalysis = async () => {
    setGapLoading(true);
    try {
      const r = await fetch(`/api/projects/${activePid}/analyze/gaps`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,language:a11yFull.lang,role:viewRole,expertise:a11yFull.expertise})
      });
      const data = await r.json();
      setGapResult(data.analysis);
    } catch{ showToast('Analysis failed','error'); }
    setGapLoading(false);
  };

  const runCompare = async () => {
    if(compareSelected.length<2) return;
    setComparing(true);
    try {
      const r = await fetch(`/api/projects/${activePid}/analyze/compare`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({doc_hashes:compareSelected,username,language:a11yFull.lang,role:viewRole,expertise:a11yFull.expertise})
      });
      const data = await r.json();
      setCompareResult(data.comparison);
      setCompareSelected([]);
    } catch{ showToast('Comparison failed','error'); }
    setComparing(false);
  };

  // ── API: Collision engine ─────────────────────────────────────────────────────
  const detectCollisions = async () => {
    const papers = Object.values(project?.papers||{});
    const summarized = papers.filter(p=>p.summary);
    if(summarized.length<2){ showToast('Analyse at least 2 papers first','error'); return; }
    setCollisionLoading(true); setCollisions([]);
    try {
      const r = await fetch(`/api/projects/${activePid}/analyze/gaps`,{method:'POST'});
      const data = await r.json();
      const text = data.analysis||'';
      const section = text.split(/#+\s*(Contradictions|Disagreements|Conflicts)/i)[1]||'';
      const lines = section.split('\n').filter(l=>l.trim())
        .filter(l=>/^[-•*]|^\d+\./.test(l.trim())||(l.length>40&&!l.startsWith('#'))).slice(0,6);
      const parsed = lines.map((line,i)=>{
        const clean = line.replace(/^[-•*\d.]\s*/,'').trim();
        if(clean.length<20) return null;
        const involvedPapers = summarized.filter(p=>{
          const title=(p.title||p.file_name||'').toLowerCase();
          return clean.toLowerCase().includes(title.slice(0,15));
        }).map(p=>(p.title||p.file_name||'').slice(0,40)+'…').slice(0,3);
        return {
          title:`Contradiction #${i+1}`,description:clean,
          papers:involvedPapers.length>0?involvedPapers:summarized.slice(0,2).map(p=>(p.title||p.file_name||'').slice(0,40)+'…'),
          confidence:['High','Medium','High','Medium','Low'][i%5]
        };
      }).filter(Boolean);
      setCollisions(parsed);
      if(parsed.length===0) showToast('No contradictions detected','success');
      else showToast(`⚡ ${parsed.length} contradiction${parsed.length>1?'s':''} detected!`,'error');
    } catch(e){ showToast('Collision detection failed: '+e.message,'error'); }
    setCollisionLoading(false);
  };

  // ── API: Deconstructor ────────────────────────────────────────────────────────
  const runDeconstructor = async () => {
    if(!deconInput.trim()) return;
    if(!activePid){ showToast('Select a project first','error'); return; }
    setDeconLoading(true); setDeconResult(null);
    try {
      const r = await fetch(`/api/projects/${activePid}/deconstruct`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({concept:deconInput.trim(),username,language:a11yFull.lang,role:viewRole,expertise:deconLevel})
      });
      const data = await r.json();
      if(!r.ok){ showToast('Deconstructor: '+(data.detail||r.status),'error'); setDeconLoading(false); return; }
      setDeconResult(data.result);
    } catch(e){ showToast('Deconstructor error: '+e.message,'error'); }
    setDeconLoading(false);
  };

  // ── API: Diagrams ─────────────────────────────────────────────────────────────
  const generateDiagram = async () => {
    setDiagramLoading(true); setDiagramCode('');
    const el = document.getElementById('mermaid-output');
    if(el) el.innerHTML='';
    try {
      const r = await fetch(`/api/projects/${activePid}/generate/diagram`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({doc_hash:diagramHash||null,diagram_type:diagramType,
          username,language:a11yFull.lang,role:viewRole,expertise:a11yFull.expertise})
      });
      const data = await r.json();
      if(!r.ok){ setDiagramLoading(false); showToast('Generation failed: '+(data.detail||r.status),'error'); return; }
      setDiagramCode(data.diagram);
      setDiagramLoading(false);
      await new Promise(res=>setTimeout(res,100));
      renderMermaid(data.diagram);
    } catch(e){ setDiagramLoading(false); showToast('Diagram error: '+e.message,'error'); }
  };

  const renderMermaid = async (code) => {
    const el = document.getElementById('mermaid-output');
    if(!el||!code) return;
    let tries=0;
    while(!window.mermaid && tries<20){ await new Promise(r=>setTimeout(r,100)); tries++; }
    if(!window.mermaid){ el.innerHTML='<div style="color:var(--red);padding:24px;font-family:monospace">Mermaid failed to load.</div>'; return; }
    try {
      el.innerHTML='';
      const id='mm-'+Date.now();
      const {svg} = await window.mermaid.render(id, code);
      el.innerHTML=svg;
    } catch(e){
      el.innerHTML=`<div style="color:var(--red);padding:24px;font-family:monospace;font-size:12px;line-height:1.6">Render error:<br>${e.message}<br><br><pre style="font-size:11px;opacity:.7">${code}</pre></div>`;
    }
  };

  // ── API: Feedback ─────────────────────────────────────────────────────────────
  const submitFeedback = async (contentType, contentRef, rating, content='') => {
    if(!activePid) return;
    try {
      await fetch(`/api/projects/${activePid}/feedback`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,content_type:contentType,content_ref:contentRef,
          rating,helpful:rating>=3,comment:'',content_preview:content.slice(0,200)})
      });
      setFeedbackSubmitted(p=>({...p,[contentRef]:true}));
    } catch {}
  };

  const loadFeedbackStats = async () => {
    if(!activePid) return;
    try {
      const r = await fetch(`/api/projects/${activePid}/feedback/stats`);
      setFeedbackStats(await r.json());
    } catch {}
  };

  const loadFeedbackSummary = async () => {
    if(!activePid) return;
    setFeedbackSummaryLoading(true);
    try {
      const r = await fetch(`/api/projects/${activePid}/feedback/summary`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username})
      });
      const data = await r.json();
      setFeedbackSummary(data.summary);
    } catch {}
    setFeedbackSummaryLoading(false);
  };

  // ── Heatmap builder ───────────────────────────────────────────────────────────
  const buildHeatmap = (proj) => {
    const NUM_WEEKS = 52;
    const today = new Date(); today.setHours(0,0,0,0);
    const activityMap={};
    const addActivity=(dateStr)=>{
      if(!dateStr) return;
      const d=dateStr.slice(0,10);
      activityMap[d]=(activityMap[d]||0)+1;
    };
    Object.values(proj?.papers||{}).forEach(p=>{
      addActivity(p.uploaded_at);
      if(p.status==='summarized') addActivity(p.uploaded_at);
      (p.annotations||[]).forEach(()=>addActivity(today.toISOString().slice(0,10)));
    });
    (proj?.chat||[]).forEach(m=>{ if(m.type==='user') addActivity(today.toISOString().slice(0,10)); });
    const startDate=new Date(today); startDate.setDate(startDate.getDate()-(NUM_WEEKS*7-1));
    const weeks=[]; const months=[]; let lastMonth=-1;
    for(let w=0;w<NUM_WEEKS;w++){
      const week=[];
      for(let d=0;d<7;d++){
        const date=new Date(startDate); date.setDate(startDate.getDate()+w*7+d);
        const dateStr=date.toISOString().slice(0,10);
        const count=activityMap[dateStr]||0;
        const level=count===0?0:count<=2?1:count<=4?2:count<=7?3:4;
        week.push({dateStr,count,level});
        const month=date.getMonth();
        if(month!==lastMonth&&d===0){
          months.push({label:date.toLocaleString('default',{month:'short'}),weekIndex:w,span:1});
          if(months.length>1) months[months.length-2].span=w-months[months.length-2].weekIndex;
          lastMonth=month;
        }
      }
      weeks.push(week);
    }
    if(months.length>0) months[months.length-1].span=NUM_WEEKS-months[months.length-1].weekIndex;
    setHeatmapData(weeks); setHeatmapMonths(months);
  };

  // ── Computed theme classes ────────────────────────────────────────────────────
  const shellDir = a11yFull.rtl ? 'rtl' : 'ltr';

  // ─── Render ───────────────────────────────────────────────────────────────────
  return (
    <div dir={shellDir} className={a11yFull.rtl?'rtl-shell':''} style={{
      display:'flex',height:'100vh',overflow:'hidden',position:'relative',
      fontFamily:a11yFull.dyslexic?"'OpenDyslexic',sans-serif":'var(--font-body)',
    }}>
      {/* Modals */}
      {showUserModal && (
        <UserModal username={username} setUsername={setUsername}
          allCollaborators={allCollaborators}
          onClose={()=>setShowUserModal(false)}/>
      )}
      {showCreateProject && (
        <CreateProjectModal username={username} onClose={()=>setShowCreateProject(false)} onCreate={createProject}/>
      )}
      {showUpload && (
        <UploadModal onClose={()=>setShowUpload(false)} onUpload={uploadFiles} uploadQueue={uploadQueue}/>
      )}

      {/* [RUBRIC B-E: A11y FAB button per spec] */}
      <button className="a11y-fab" onClick={()=>setShowA11yPanel(!showA11yPanel)}
        title="Accessibility settings" aria-label="Open accessibility settings"
        style={{position:'fixed',bottom:24,left:24,width:44,height:44,borderRadius:'50%',
          background:'var(--glass-bg)',backdropFilter:'var(--glass-blur)',
          border:'1px solid var(--glass-border)',display:'flex',alignItems:'center',
          justifyContent:'center',cursor:'pointer',fontSize:18,zIndex:800}}>
        ♿
      </button>

      {/* [RUBRIC B-E: Accessibility Panel per spec] */}
      {showA11yPanel && (
        <AccessibilityPanel a11y={a11yFull} setA11y={setA11y} onClose={()=>setShowA11yPanel(false)}/>
      )}

      {/* Toast notifications */}
      <Toast toasts={toasts}/>

      {/* Mobile overlay */}
      {mobileSidebarOpen && (
        <div onClick={()=>setMobileSidebarOpen(false)}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(2px)',
            zIndex:499,display:'none'}}/>
      )}

      {/* Sidebar */}
      {!sidebarCollapsed && (
        <Sidebar tab={tab} setTab={setTab} projects={projects} activePid={activePid}
          setActivePid={setActivePid} onProjectChange={onProjectChange} project={project}
          onCreateProject={()=>setShowCreateProject(true)} stats={stats}
          collisions={collisions} t={t} collapsed={sidebarCollapsed}
          onMobileClose={()=>setMobileSidebarOpen(false)}/>
      )}

      {/* Main content */}
      <main aria-label="Main content area" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {/* Top Bar */}
        <TopBar project={project} tab={tab} username={username} setShowUserModal={setShowUserModal}
          viewRole={viewRole} setViewRole={setViewRole} a11y={a11yFull} setA11y={setA11y}
          showA11yPanel={showA11yPanel} setShowA11yPanel={setShowA11yPanel}
          onUpload={()=>setShowUpload(true)} sidebarCollapsed={sidebarCollapsed}
          setSidebarCollapsed={setSidebarCollapsed}
          onMobileSidebarToggle={()=>setMobileSidebarOpen(!mobileSidebarOpen)}
          syncPreferences={syncPreferences}/>

        {/* Tab bar */}
        <TabBar tab={tab} setTab={setTab} project={project} collisions={collisions} t={t}/>

        {/* Panels */}
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}}>

          {/* Home */}
          {tab==='home' && (
            <Home projects={projects} onEnterProject={enterProject}
              onCreateProject={()=>setShowCreateProject(true)} username={username} t={t}/>
          )}

          {/* Dashboard */}
          {tab==='dashboard' && project && (
            <Dashboard project={project} stats={stats} onUpload={()=>setShowUpload(true)}
              username={username} feedbackStats={feedbackStats} feedbackSummary={feedbackSummary}
              feedbackSummaryLoading={feedbackSummaryLoading}
              onLoadFeedbackStats={loadFeedbackStats} onFeedbackSummary={loadFeedbackSummary}
              viewRole={viewRole}/>
          )}

          {/* Library */}
          {tab==='library' && project && (
            <Library project={project} selectedHash={selectedHash} setSelectedHash={setSelectedHash}
              setSelectedPaper={setSelectedPaper} selectedPaper={selectedPaper}
              onAnalyse={analysePaper} onDelete={deletePaper} onAddAnnotation={addAnnotation}
              onDeleteAnnotation={deleteAnnotation} analysing={analysing}
              compareSelected={compareSelected} setCompareSelected={setCompareSelected}
              compareMode={compareMode} setCompareMode={setCompareMode}
              onCompare={runCompare} comparing={comparing} compareResult={compareResult}
              a11y={a11yFull} feedbackSubmitted={feedbackSubmitted} onFeedback={submitFeedback}/>
          )}

          {/* Chat */}
          {tab==='chat' && project && (
            <Chat project={project} username={username} chatLoading={chatLoading}
              onSend={sendChat} useWebSearch={useWebSearch} setUseWebSearch={setUseWebSearch}
              a11y={a11yFull} t={t} feedbackSubmitted={feedbackSubmitted} onFeedback={submitFeedback}/>
          )}

          {/* Insights */}
          {tab==='insights' && project && (
            <Insights project={project} gapResult={gapResult} gapLoading={gapLoading}
              onGapAnalysis={runGapAnalysis} compareResult={compareResult}
              compareSelected={compareSelected} setCompareSelected={setCompareSelected}
              onCompare={runCompare} comparing={comparing}
              feedbackSubmitted={feedbackSubmitted} onFeedback={submitFeedback} a11y={a11yFull} t={t}/>
          )}

          {/* Collab */}
          {tab==='collab' && project && (
            <Collab project={project} collisions={collisions} collisionLoading={collisionLoading}
              onDetectCollisions={detectCollisions} heatmapData={heatmapData} heatmapMonths={heatmapMonths}/>
          )}

          {/* Diagrams */}
          {tab==='visuals' && project && (
            <Diagrams project={project} diagramCode={diagramCode} diagramType={diagramType}
              setDiagramType={setDiagramType} diagramHash={diagramHash} setDiagramHash={setDiagramHash}
              diagramLoading={diagramLoading} onGenerate={generateDiagram}/>
          )}

          {/* Deconstructor */}
          {tab==='deconstructor' && (
            <Deconstructor deconInput={deconInput} setDeconInput={setDeconInput}
              deconResult={deconResult} deconLoading={deconLoading} onDeconstruct={runDeconstructor}
              deconLevel={deconLevel} setDeconLevel={setDeconLevel}
              a11y={a11yFull} t={t} feedbackSubmitted={feedbackSubmitted} onFeedback={submitFeedback}/>
          )}

          {/* No project selected states */}
          {tab!=='home' && tab!=='deconstructor' && !project && (
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
              justifyContent:'center',gap:12,color:'var(--t2)',textAlign:'center',padding:40}}>
              <Icon name="FolderOpen" size={40} opacity={.4}/>
              <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:600,color:'var(--t1)'}}>
                No project selected
              </div>
              <div style={{fontSize:12,lineHeight:1.65}}>Select a project from the sidebar or create a new one to get started.</div>
              <Btn primary onClick={()=>setShowCreateProject(true)} style={{marginTop:8}}>
                <Icon name="PlusCircle" size={14}/> Create a Project
              </Btn>
            </div>
          )}
        </div>
      </main>

      {/* Typing dots keyframes */}
      <style>{`
        @keyframes dot-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
        .md-content h1,.md-content h2{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--t0);margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
        .md-content h3{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--t0);margin:14px 0 6px}
        .md-content ul,.md-content ol{padding-left:18px;margin:6px 0}
        .md-content li{margin-bottom:4px}
        .md-content strong{color:var(--t0);font-weight:600}
        .md-content code{font-family:monospace;font-size:11.5px;background:var(--bg3);padding:2px 6px;border-radius:4px;color:var(--blue3)}
        .md-content pre{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin:10px 0;overflow-x:auto}
        .md-content blockquote{border-left:3px solid var(--blue);padding:8px 14px;color:var(--t1);margin:10px 0;background:var(--blue-bg);border-radius:0 var(--radius) var(--radius) 0}
        .md-content p{margin-bottom:8px}
      `}</style>
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
{% endraw %}
</body>
</html>
