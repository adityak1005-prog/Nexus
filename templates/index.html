<!DOCTYPE html>
<!-- [RUBRIC 2A: Semantic root with lang attribute for screen readers] -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Nexus — AI Research Intelligence Platform for collaborative academic knowledge curation"/>
<title>Nexus — Research Intelligence Platform</title>

<!-- [RUBRIC 2A: Premium typography — Playfair Display (serif display) + Inter (body)] -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<!-- [RUBRIC B-E: OpenDyslexic for neurodiversity support] -->
<link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet"/>

<!-- Tailwind CSS Play CDN with JIT (supports arbitrary values) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ["'Playfair Display'", 'Georgia', 'serif'],
          body: ["'Inter'", 'system-ui', 'sans-serif'],
          dyslexic: ["'OpenDyslexic'", 'sans-serif'],
        }
      }
    }
  }
</script>

<!-- React 18 + Babel Standalone for JSX -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Lucide React for icons -->
<script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js"></script>

<!-- Marked.js for markdown rendering -->

<!-- KaTeX for LaTeX / math rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="window._katexReady=true"></script>

<!-- Mermaid 11 for diagram generation -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  window.mermaid = mermaid;
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      darkMode: true, background: '#03070F', primaryColor: '#1a3a6e',
      primaryTextColor: '#f0f6fc', primaryBorderColor: '#3b82f6',
      lineColor: '#3b82f6', secondaryColor: '#0d1a2e', tertiaryColor: '#111b2e',
      fontFamily: 'Inter, sans-serif', fontSize: '13px',
    },
    flowchart: { curve: 'basis', padding: 20 },
  });
</script>

<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS — DUAL THEME SYSTEM
   Dark: OLED #03070F  |  Light: Crisp #FCFCFC
   Following the "Dia × Arc" aesthetic brief exactly
   ═══════════════════════════════════════════════════════════════ */
:root {
  /* Dark defaults (OLED-optimised) */
  --bg0: #03070F; --bg1: #080F1C; --bg2: #0d1623; --bg3: #111b2e; --bg4: #172237;
  --border: #1a2640; --border2: #243352;
  --blue: #2563eb; --blue2: #3b82f6; --blue3: #93c5fd;
  --blue-bg: rgba(37,99,235,.1); --blue-bg2: rgba(37,99,235,.18);
  --glow-blue: rgba(37,99,235,.35); --glow-blue2: rgba(59,130,246,.2);
  --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
  --purple: #a855f7; --cyan: #06b6d4;
  --t0: #f0f6fc; --t1: #8b949e; --t2: #3d4f68;
  --glass-bg: rgba(8,15,28,.65); --glass-border: rgba(37,99,235,.15);
  --glass-blur: blur(20px);
  --sidebar-w: 260px; --topbar-h: 56px;
  --radius: 8px; --radius-lg: 14px; --radius-xl: 20px;
  /* [RUBRIC 2A: Typography tokens per spec] */
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
}

/* [RUBRIC B-E: High Contrast — WCAG AAA 7:1] */
.hc { --bg0:#000!important;--bg1:#050505!important;--bg2:#0a0a0a!important;
  --border:#fff!important;--t0:#fff!important;--t1:#eee!important;--t2:#ccc!important;
  --blue:#5599ff!important;--blue2:#77aaff!important;--green:#55ff55!important;
  --glass-bg:#050505!important; }

/* [RUBRIC B-E: Light mode] */
.light {
  --bg0:#FCFCFC; --bg1:#FFFFFF; --bg2:#F7F9FC; --bg3:#EDF1F7; --bg4:#DDE3ED;
  --border:#E1E7EF; --border2:#C8D3E0;
  --blue:#1746C8; --blue2:#2563EB; --blue3:#1E40AF;
  --blue-bg:rgba(23,70,200,.06); --blue-bg2:rgba(23,70,200,.1);
  --glow-blue:rgba(23,70,200,.18); --glow-blue2:rgba(37,99,235,.08);
  --green:#15803D; --red:#DC2626; --orange:#C2410C; --purple:#6D28D9; --cyan:#0369A1;
  --t0:#0D1829; --t1:#374557; --t2:#6B7A8F;
  --glass-bg:rgba(255,255,255,.92); --glass-border:rgba(23,70,200,.1);
}

/* [RUBRIC B-E: Dyslexia friendly] */
.dyslexic * { font-family: 'OpenDyslexic', sans-serif !important;
  letter-spacing:.08em!important; line-height:1.9!important; word-spacing:.16em!important; }

/* [RUBRIC B-E: Reduced motion] */
@media(prefers-reduced-motion:reduce), .reduced-motion * {
  animation-duration:.01ms!important; transition-duration:.01ms!important; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* [RUBRIC B-E: Focus-visible for keyboard nav] */
:focus-visible { outline: 2.5px solid var(--blue2)!important; outline-offset:3px!important;
  border-radius:4px!important; }
:focus:not(:focus-visible) { outline:none; }

html, body { height:100%; overflow:hidden; background:var(--bg0);
  color:var(--t0); font-family:var(--font-body);
  font-size:clamp(12px,1.3vw,14px); line-height:1.55;
  -webkit-font-smoothing:antialiased; transition:background .25s,color .25s; }

/* [RUBRIC 2A: Subtle grain texture for atmospheric depth] */
body::before { content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9998; opacity:.4; }
.light body::before { opacity:0; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--blue); }

/* [RUBRIC 2A: Spatial Shadows per spec] */
.shadow-spatial { box-shadow: 0 12px 48px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04); }

/* Mermaid output */
#mermaid-output svg { display:block; max-width:none!important; height:auto!important;
  filter:drop-shadow(0 4px 24px rgba(37,99,235,.1)); }

/* [RUBRIC B-E: RTL support] */
.rtl-shell { direction:rtl; }
.rtl-shell .sidebar { border-right:none!important; border-left:1px solid var(--border); }

/* Chat bubble asymmetry for imessage look */
.bubble-user { border-radius: 20px 20px 4px 20px !important; }
.bubble-ai   { border-radius: 20px 20px 20px 4px !important; }

/* [RUBRIC 2A: Text rotator animation] */
@keyframes slideUp { 0%{opacity:1;transform:translateY(0)} 80%{opacity:1;transform:translateY(-4px)} 100%{opacity:0;transform:translateY(-8px)} }
@keyframes slideIn { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
.rotate-in  { animation: slideIn 0.5s ease forwards; }
.rotate-out { animation: slideUp 0.5s ease forwards; }

/* Spinner */
@keyframes spin { to { transform:rotate(360deg); } }
.spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff; border-radius:50%; animation:spin .55s linear infinite; display:inline-block; }

/* Shimmer loader */
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.shimmer { background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--radius); }

/* Toast animations */
@keyframes toast-in { from{opacity:0;transform:translateY(12px) scale(.96)} to{opacity:1;transform:none} }
@keyframes msg-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* Heatmap */
.hc-0{background:var(--bg3)} .hc-1{background:rgba(37,99,235,.25)}
.hc-2{background:rgba(37,99,235,.45)} .hc-3{background:rgba(37,99,235,.65)}
.hc-4{background:rgba(37,99,235,.9); box-shadow:0 0 4px var(--glow-blue)}

/* Bento grid hover [RUBRIC 3A] */
.bento-hover { transition: all 300ms cubic-bezier(0.2,0.8,0.2,1); }
.bento-hover:hover { transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08) !important; }

/* [RUBRIC 3B: Collision pulse] */
@keyframes collision-pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}
  50%{box-shadow:0 0 12px rgba(239,68,68,.12)} }
.collision-card { animation: collision-pulse 3s ease infinite; }

/* Tab underline active */
.tab-active { color: var(--blue2) !important; border-bottom: 2px solid var(--blue2); }

/* Sidebar active nav */
.nav-active { background: var(--blue-bg2)!important; color: var(--blue2)!important;
  border-color: var(--glass-border)!important; }
.nav-active::before { content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:2px; background:var(--blue2); border-radius:2px;
  box-shadow:0 0 6px var(--glow-blue); }

/* Paper card hover */
.paper-card-hover:hover { border-color:var(--blue)!important;
  box-shadow:0 8px 32px var(--glow-blue2); transform:translateY(-2px); }

/* [RUBRIC 3B: Scaffold blocks] */
.decon-block { border-left: 3px solid var(--blue); transition: transform .15s, box-shadow .15s; }
.decon-block:hover { transform: translateX(3px); box-shadow: 0 4px 22px rgba(37,99,235,.1); }

/* Progress shimmer */
@keyframes progress-shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
.progress-fill { background: linear-gradient(90deg, var(--blue), var(--cyan), var(--blue2));
  background-size: 200% 100%; animation: progress-shimmer 2.2s linear infinite; }

/* Star rating */
.star-active { color: #f59e0b; transform: scale(1.18); }
.star-inactive { color: #f59e0b; opacity: 0.28; }
.star-btn:hover { opacity: 1 !important; transform: scale(1.22) !important; }

/* [RUBRIC B-E: A11y FAB breathe animation] */
@keyframes a11y-breathe {
  0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 0 0 var(--glow-blue)}
  50%{box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 0 4px var(--glow-blue2)} }
.a11y-fab { animation: a11y-breathe 3s ease infinite; }

/* Modal animation */
@keyframes modal-in { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:none} }
.modal-enter { animation: modal-in .22s cubic-bezier(.34,1.56,.64,1); }

/* Panel rise */
@keyframes panel-rise { from{opacity:0;transform:translateY(12px) scale(.97)} to{opacity:1;transform:none} }
.panel-rise { animation: panel-rise .22s cubic-bezier(.34,1.56,.64,1); }

/* Btn shimmer */
.btn-shimmer::after { content:''; position:absolute; top:0; left:-100%; right:100%; bottom:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  transition:left .35s,right .35s; }
.btn-shimmer:hover::after { left:0; right:0; }

/* Brand logo gradient [RUBRIC 2A] */
.brand-logo-grad {
  background: linear-gradient(135deg, #1a56db 0%, #3b82f6 55%, #06b6d4 100%);
  box-shadow: 0 0 18px rgba(37,99,235,.45), 0 0 36px rgba(6,182,212,.1); }

/* [RUBRIC 2A: Ambient radial gradients behind content] */
.ambient-purple { background: radial-gradient(circle, rgba(168,85,247,.3), transparent 70%); }
.ambient-blue   { background: radial-gradient(circle, rgba(59,130,246,.25), transparent 70%); }
.ambient-orange { background: radial-gradient(circle, rgba(251,146,60,.2), transparent 70%); }

/* Upload zone */
.upload-zone { border:2px dashed var(--border2); border-radius:var(--radius-xl);
  padding:32px 24px; text-align:center; cursor:pointer; transition:all .22s;
  background:var(--glass-bg); position:relative; overflow:hidden; }
.upload-zone:hover, .upload-zone.drag-over {
  border-color:var(--blue); box-shadow:0 0 0 4px var(--glow-blue2); }
.upload-zone.drag-over { transform:scale(1.01); }

@media(max-width:768px) {
  .sidebar-mobile-hidden { transform:translateX(-100%)!important; }
  .sidebar-mobile-open { transform:translateX(0)!important; }
}
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Lucide Icons ────────────────────────────────────────────────────────────

const Icon = ({ name, size=16, ...props }) => {

  return C ? React.createElement(C, { size, strokeWidth:1.75, ...props }) : React.createElement('span', props, '?');
};

// ─── i18n ────────────────────────────────────────────────────────────────────
const TRANSLATIONS = {

};

// ─── Helpers ─────────────────────────────────────────────────────────────────
const initials = (name='') => name.split(' ').map(w=>w[0]?.toUpperCase()||'').join('').slice(0,2)||'?';
const avatarColor = (name='') => {
  const colors=['#2563eb','#7c3aed','#059669','#dc2626','#d97706','#0891b2','#c026d3','#16a34a'];
  let hash=0; for(let c of name) hash=(hash*31+c.charCodeAt(0))%colors.length;
  return colors[Math.abs(hash)];
};
const fmtDate = (iso) => { if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString(); };
const md = (text='') => { try { return { __html: window.marked?.parse(text)||text }; } catch { return { __html: text }; }};

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({ toasts }) {
  return (
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
      {toasts.map(t => (
        <div key={t.id} style={{
          padding:'12px 18px', borderRadius:'var(--radius-lg)', fontSize:12, fontWeight:600,
          border:'1px solid var(--border)', background:'var(--glass-bg)', backdropFilter:'var(--glass-blur)',
          boxShadow:'0 8px 40px rgba(0,0,0,.5)', animation:'toast-in .22s ease',
          color: t.type==='success'?'var(--green)':t.type==='error'?'var(--red)':'var(--blue2)',
          borderColor: t.type==='success'?'rgba(34,197,94,.4)':t.type==='error'?'rgba(239,68,68,.4)':'rgba(37,99,235,.4)',
          display:'flex',alignItems:'center',gap:8,maxWidth:360,
        }}>
          {t.type==='success'?'✓':t.type==='error'?'✕':'ℹ'} {t.msg}
        </div>
      ))}
    </div>
  );
}

// ─── Modal Wrapper ─────────────────────────────────────────────────────────────
function Modal({ children, onClose }) {
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',backdropFilter:'blur(4px)',
      display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div className="modal-enter" style={{background:'var(--bg1)',border:'1px solid var(--border2)',
        borderRadius:'var(--radius-xl)',width:520,maxWidth:'94vw',maxHeight:'88vh',overflowY:'auto',
        boxShadow:'0 24px 80px rgba(0,0,0,.75)'}}>
        {children}
      </div>
    </div>
  );
}

// ─── Toggle Switch ─────────────────────────────────────────────────────────────
function Toggle({ checked, onChange, label }) {
  return (
    <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
      <div style={{width:38,height:22,borderRadius:11,background:checked?'var(--blue)':'var(--bg3)',
        border:'1px solid',borderColor:checked?'var(--blue)':'var(--border)',
        position:'relative',transition:'background .2s',cursor:'pointer'}} onClick={()=>onChange(!checked)}>
        <div style={{position:'absolute',top:3,left:3,width:14,height:14,borderRadius:'50%',
          background:checked?'#fff':'var(--t2)',
          transform:checked?'translateX(16px)':'translateX(0)',transition:'all .2s'}}/>
      </div>
      {label && <span style={{fontSize:12,color:'var(--t0)'}}>{label}</span>}
    </label>
  );
}

// ─── Star Rating ──────────────────────────────────────────────────────────────
function StarRating({ value, onChange }) {
  return (
    <div style={{display:'flex',gap:2}}>
      {[1,2,3,4,5].map(s => (
        <button key={s} className="star-btn" onClick={()=>onChange(s)}
          style={{background:'transparent',border:'none',cursor:'pointer',fontSize:20,padding:'0 2px',
            transition:'transform .1s',
            color:'#f59e0b', opacity:s<=value?1:0.28, transform:s<=value?'scale(1.1)':'none'}}>★</button>
      ))}
    </div>
  );
}

// ─── Markdown Renderer ────────────────────────────────────────────────────────
function MarkdownContent({ text, className='' }) {
  const ref = useRef();
  useEffect(()=>{
    if(ref.current && window._katexReady && window.renderMathInElement) {
      window.renderMathInElement(ref.current,{delimiters:[
        {left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},
        {left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}
      ],throwOnError:false});
    }
  },[text]);
  return <div ref={ref} className={className} dangerouslySetInnerHTML={md(text)}

}

// ─── Btn helper ───────────────────────────────────────────────────────────────
function Btn({ children, primary, ghost, danger, small, onClick, disabled, className='', style:sx={} }) {
  const base = { display:'inline-flex',alignItems:'center',gap:6,borderRadius:'var(--radius)',
    fontFamily:'var(--font-body)',fontSize:small?11:12,fontWeight:600,cursor:'pointer',
    border:'1px solid transparent',transition:'all .18s',whiteSpace:'nowrap',
    padding:small?'4px 10px':'7px 15px',position:'relative',overflow:'hidden',
    opacity:disabled?.4:1,pointerEvents:disabled?'none':'auto', ...sx };
  const variant = primary ? { background:'linear-gradient(135deg,#1748d4,#2563eb)',color:'#fff',
    borderColor:'rgba(59,130,246,.45)',boxShadow:'0 2px 12px rgba(37,99,235,.32)' }
    : danger ? { background:'rgba(239,68,68,.08)',color:'var(--red)',borderColor:'rgba(239,68,68,.2)' }
    : ghost ? { background:'transparent',color:'var(--t1)',borderColor:'var(--border)' }
    : { background:'var(--bg2)',color:'var(--t0)',borderColor:'var(--border)' };
  return (
    <button className={`btn-shimmer ${className}`} onClick={onClick} disabled={disabled}
      style={{...base,...variant}}>
      {children}
    </button>
  );
}

            </div>
          ))}
        </div>

        {/* Quick start */}
        {projects.length === 0 && (
          <div style={{background:'var(--glass-bg)',border:'1px solid var(--border)',

            <h3 style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700,
              color:'var(--t0)',marginBottom:20}}>Quick Start</h3>
            {[
              {n:1,title:'Create a project',desc:'Give your research a name and problem statement'},
              {n:2,title:'Upload PDFs',desc:'Drag & drop papers — auto-chunked & embedded into Pinecone'},
              {n:3,title:'Analyse papers',desc:'AI extracts summaries, reliability scores, and topics'},
              {n:4,title:'Chat with your library',desc:'RAG Q&A with source citations across all your papers'},
              {n:5,title:'Discover insights',desc:'Gap analysis, contradiction detection, and Mermaid diagrams'},
            ].map(s=>(
              <div key={s.n} style={{display:'flex',gap:14,padding:'12px 0',
                borderBottom:'1px solid var(--border)'}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:'var(--blue-bg2)',
                  color:'var(--blue2)',fontFamily:'var(--font-display)',fontSize:12,fontWeight:700,
                  display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                  border:'1px solid var(--glass-border)'}}>{s.n}</div>
                <div>
                  <strong style={{fontFamily:'var(--font-display)',fontSize:13,color:'var(--t0)',
                    fontWeight:600,display:'block',marginBottom:2}}>{s.title}</strong>
                  <span style={{fontSize:12,color:'var(--t1)'}}>{s.desc}</span>
                </div>
              </div>
            ))}
            <div style={{marginTop:20}}>
              {/* [RUBRIC 3A: CTA button to go to workspace per spec] */}
              <Btn primary onClick={onCreateProject} style={{padding:'12px 28px',fontSize:14,borderRadius:999}}>
                Create your first project →
              </Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ project, stats, onUpload, username, feedbackStats, feedbackSummary, feedbackSummaryLoading, onLoadFeedbackStats, onFeedbackSummary, viewRole }) {

  const collaborators = Object.entries(project?.collaborators||{});

          { icon:'MessageSquare', label:'Chat Messages', value:stats.chat_messages||0, color:'var(--purple)' },
          { icon:'CheckCircle', label:'Analysed', value:stats.summarized_papers||0, color:'var(--green)' },

        {/* Project info */}
        <div style={{background:'var(--glass-bg)',border:'1px solid var(--border)',
          borderRadius:'var(--radius-lg)',padding:20}}>
          <div style={{fontFamily:'monospace',fontSize:10,fontWeight:600,color:'var(--t2)',
            textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14,paddingBottom:10,
            borderBottom:'1px solid var(--border)'}}>Project Overview</div>

        {/* [RUBRIC B-B: Collaborator avatars per spec — overlapping ring borders] */}
        <div style={{background:'var(--glass-bg)',border:'1px solid var(--border)',
          borderRadius:'var(--radius-lg)',padding:20}}>
          <div style={{fontFamily:'monospace',fontSize:10,fontWeight:600,color:'var(--t2)',
            textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14,paddingBottom:10,
            borderBottom:'1px solid var(--border)'}}>Team Members</div>
          {collaborators.length > 0 ? (
            <div>

                    onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.zIndex='1'}}>
                    {initials(name)}

                ))}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {collaborators.map(([name,c])=>(

                    <div style={{width:22,height:22,borderRadius:'50%',display:'flex',

                      color:'#fff',background:c.color||avatarColor(name)}}>{initials(name)}</div>
                    <div style={{flex:1}}>
                      <span style={{fontSize:12,fontWeight:500,color:'var(--t0)'}}>{name}</span>

        {/* Recent papers */}
        <div style={{background:'var(--glass-bg)',border:'1px solid var(--border)',
          borderRadius:'var(--radius-lg)',padding:20,gridColumn:'1/-1'}}>
          <div style={{fontFamily:'monospace',fontSize:10,fontWeight:600,color:'var(--t2)',
            textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14,paddingBottom:10,
            borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Recent Papers</span>
            <Btn primary small onClick={onUpload}><Icon name="Upload" size={12}/> Upload PDF</Btn>
          </div>
          {papers.length === 0 ? (
            <div style={{textAlign:'center',padding:'32px 0',color:'var(--t2)',fontSize:13}}>

            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10}}>
              {papers.slice(0,6).map(p=>(
                <div key={p.doc_hash} style={{background:'var(--bg2)',border:'1px solid var(--border)',
                  borderRadius:'var(--radius)',padding:12}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--t0)',marginBottom:4,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.title||p.file_name}</div>
                  <div style={{display:'flex',alignItems:'center',gap:6,fontFamily:'monospace',fontSize:10}}>
                    <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,
                      background:p.status==='summarized'?'var(--green)':p.status==='processing'?'var(--orange)':'var(--t2)'}}/>
                    <span style={{color:'var(--t2)'}}>{p.status||'pending'}</span>
                    <span style={{color:'var(--t2)'}}>· {p.num_pages||0}p</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* [RUBRIC 3C: Supervisor-only feedback section] */}
        {viewRole === 'supervisor' && (
          <div style={{background:'var(--glass-bg)',border:'1px solid var(--border)',
            borderRadius:'var(--radius-lg)',padding:20,gridColumn:'1/-1'}}>
            <div style={{fontFamily:'monospace',fontSize:10,fontWeight:600,color:'var(--t2)',
              textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14,paddingBottom:10,
              borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span>Feedback Analytics</span>
                <span style={{background:'rgba(168,85,247,.1)',color:'var(--purple)',
                  border:'1px solid rgba(168,85,247,.3)',padding:'1px 7px',borderRadius:4,
                  fontFamily:'monospace',fontSize:9,fontWeight:700,textTransform:'uppercase'}}>SUPERVISOR</span>
              </div>
              <div style={{display:'flex',gap:6}}>
                <Btn ghost small onClick={onLoadFeedbackStats}>Load Stats</Btn>
                <Btn ghost small onClick={onFeedbackSummary} disabled={feedbackSummaryLoading}>
                  {feedbackSummaryLoading ? <><span className="spinner" style={{width:10,height:10}}/> Generating…</> : 'AI Summary'}
                </Btn>
              </div>
            </div>
            {feedbackStats && (
              <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:16}}>
                {[
                  { label:'Total Ratings', value:feedbackStats.total_ratings||0 },
                  { label:'Avg Rating', value:(feedbackStats.avg_rating||0).toFixed(1)+'★' },
                  { label:'Helpful', value:Math.round((feedbackStats.helpful_pct||0)*100)+'%' },
                ].map(s=>(
                  <div key={s.label} style={{padding:'10px 14px',background:'var(--bg2)',borderRadius:8,
                    border:'1px solid var(--border)',minWidth:120}}>
                    <div style={{fontFamily:'var(--font-display)',fontSize:24,fontWeight:700,color:'var(--t0)'}}>{s.value}</div>
                    <div style={{fontSize:10,color:'var(--t2)',fontFamily:'monospace'}}>{s.label}</div>
                  </div>
                ))}
              </div>
            )}
            {feedbackSummary && (
              <MarkdownContent text={feedbackSummary} className="md-content"
                style={{fontSize:13,color:'var(--t1)',lineHeight:1.85}}/>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Library ──────────────────────────────────────────────────────────────────
function Library({ project, selectedHash, setSelectedHash, setSelectedPaper, selectedPaper,
    onAnalyse, onDelete, onAddAnnotation, onDeleteAnnotation, analysing, compareSelected,
    setCompareSelected, compareMode, setCompareMode, onCompare, comparing, compareResult, a11y,
    onSpeakText, feedbackSubmitted, onFeedback }) {
  const [newAnnotation, setNewAnnotation] = useState('');
  const papers = Object.entries(project?.papers||{});

  const speakSummary = () => {
    // [RUBRIC B-E: TTS synthesis triggered per spec]
    if(a11y.tts && selectedPaper?.summary) {
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(selectedPaper.summary));
    }
  };

  return (
    <div style={{flex:1,display:'flex',overflow:'hidden'}}>
      {/* Paper grid */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px',minWidth:0}}>
        {compareMode && (
          <div style={{background:'var(--blue-bg)',border:'1px solid rgba(37,99,235,.25)',
            borderRadius:'var(--radius)',padding:'10px 14px',display:'flex',
            alignItems:'center',gap:10,marginBottom:14,fontSize:12,color:'var(--blue2)'}}>
            <Icon name="GitMerge" size={14}/> Select {2-compareSelected.length} more paper{compareSelected.length===1?'':'s'} to compare
            {compareSelected.length >= 2 && (
              <Btn primary small onClick={onCompare} disabled={comparing} style={{marginLeft:'auto'}}>
                {comparing?<><span className="spinner" style={{width:10,height:10}}/> Comparing…</>:'Compare Now'}
              </Btn>
            )}
            <Btn ghost small onClick={()=>{setCompareMode(false);setCompareSelected([]);}}>Cancel</Btn>
          </div>
        )}
        {compareResult && (
          <div style={{background:'var(--glass-bg)',border:'1px solid var(--border)',
            borderRadius:'var(--radius-lg)',padding:20,marginBottom:16}}>
            <div style={{fontFamily:'monospace',fontSize:10,fontWeight:600,color:'var(--t2)',
              textTransform:'uppercase',letterSpacing:'.08em',marginBottom:12}}>Comparison Result</div>
            <MarkdownContent text={compareResult}/>
          </div>
        )}
        {papers.length === 0 ? (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            height:'60%',textAlign:'center',color:'var(--t2)',gap:12}}>
            <Icon name="BookOpen" size={40} opacity={.4}/>
            <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:600,color:'var(--t1)'}}>No papers yet</div>
            <div style={{fontSize:12}}>Upload PDFs using the button in the top bar</div>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
            {papers.map(([hash,p])=>(
              <div key={hash} className="paper-card-hover"
                onClick={()=>{setSelectedHash(hash);setSelectedPaper(p);
                  if(compareMode){setCompareSelected(s=>s.includes(hash)?s.filter(x=>x!==hash):[...s,hash]);}}}
                style={{background:'var(--glass-bg)',backdropFilter:'var(--glass-blur)',
                  border:'1px solid',borderColor:selectedHash===hash?'var(--blue)'
                    :compareSelected.includes(hash)?'var(--blue2)':'var(--border)',
                  borderRadius:'var(--radius-lg)',padding:16,cursor:'pointer',transition:'all .18s',
                  position:'relative',overflow:'hidden',
                  boxShadow:compareSelected.includes(hash)?'0 0 0 2px rgba(37,99,235,.25)':'none'}}>
                {compareSelected.includes(hash) && (
                  <div style={{position:'absolute',top:10,right:10,width:20,height:20,borderRadius:'50%',
                    background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Icon name="Check" size={12} color="#fff"/>
                  </div>
                )}
                <div style={{fontSize:13,fontWeight:600,color:'var(--t0)',lineHeight:1.45,marginBottom:5}}>{p.title||p.file_name}</div>
                <div style={{fontSize:11,color:'var(--t1)',marginBottom:10}}>{p.author}</div>
                {p.subtopics?.length > 0 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:10}}>
                    {p.subtopics.slice(0,3).map(st=>(
                      <span key={st} style={{display:'inline-block',padding:'2px 9px',borderRadius:5,
                        fontFamily:'monospace',fontSize:10,background:'var(--blue-bg2)',color:'var(--blue3)',
                        border:'1px solid var(--glass-border)'}}>{st}</span>
                    ))}
                  </div>
                )}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,fontFamily:'monospace',fontSize:10}}>
                    <div style={{width:6,height:6,borderRadius:'50%',
                      background:p.status==='summarized'?'var(--green)':p.status==='processing'?'var(--orange)':'var(--t2)'}}/>
                    <span style={{color:'var(--t2)'}}>{p.status||'pending'}</span>
                    <span style={{color:'var(--t2)'}}>· {p.num_pages||0}p</span>
                  </div>
                  <span style={{fontFamily:'monospace',fontSize:9,color:'var(--t2)'}}>{fmtDate(p.uploaded_at)}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── Paper detail pane — 3-column layout ──────────────────────────────── */}
      {selectedPaper && (
        <div style={{
          width: 780, flexShrink: 0, overflow: 'hidden',
          borderLeft: '1px solid var(--border)',
          display: 'flex', flexDirection: 'column',
          background: 'var(--bg1)',
        }}>
          {/* ── Header row: title · status badge · action buttons ── */}
          <div style={{
            padding: '14px 18px', borderBottom: '1px solid var(--border)',
            flexShrink: 0, display: 'flex', alignItems: 'flex-start', gap: 12,

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{
                fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 700,
                color: 'var(--t0)', lineHeight: 1.4, marginBottom: 3,
              }}>{selectedPaper.title || selectedPaper.file_name}</div>
              <div style={{ fontSize: 11, color: 'var(--t1)', marginBottom: 8 }}>{selectedPaper.author}</div>
              {selectedPaper.status !== 'summarized' ? (
                <Btn primary onClick={onAnalyse} disabled={analysing} style={{ justifyContent: 'center' }}>
                  {analysing
                    ? <><span className="spinner" /> Analysing…</>
                    : <><Icon name="Zap" size={14} /> Analyse with AI</>}
                </Btn>
              ) : (
                <div style={{
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                  padding: '4px 10px', borderRadius: 'var(--radius)',
                  background: 'rgba(34,197,94,.1)', border: '1px solid rgba(34,197,94,.3)',
                  fontSize: 10, fontWeight: 700, color: 'var(--green)',
                  fontFamily: 'monospace', textTransform: 'uppercase', letterSpacing: '.05em',
                }}>
                  <Icon name="CheckCircle" size={12} /> Analysed
                </div>
              )}
            </div>
            {/* Action buttons */}
            <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>

                  style={{
                    width: 30, height: 30, borderRadius: 'var(--radius)',
                    border: '1px solid var(--border)', background: 'var(--bg2)',
                    color: 'var(--t1)', cursor: 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                  <Icon name="Volume2" size={14} />
                </button>
              )}

                style={{
                  width: 30, height: 30, borderRadius: 'var(--radius)',
                  border: '1px solid var(--border)',
                  background: compareMode ? 'var(--blue-bg)' : 'var(--bg2)',
                  color: compareMode ? 'var(--blue2)' : 'var(--t1)',
                  cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                <Icon name="GitMerge" size={14} />
              </button>
              <button onClick={onDelete} title="Delete paper"
                style={{
                  width: 30, height: 30, borderRadius: 'var(--radius)',
                  border: '1px solid rgba(239,68,68,.2)',
                  background: 'rgba(239,68,68,.08)', color: 'var(--red)',

                }}>
                <Icon name="Trash2" size={14} />
              </button>
            </div>
          </div>

          {/* ── 3-column body ── */}
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>

            {/* Column 1 (Left) — Reliability Assessment · ShieldCheck */}
            <div style={{
              flex: 1, overflowY: 'auto', padding: 16,
              borderRight: '1px solid var(--border)',
            }}>
              <div style={{
                fontFamily: 'monospace', fontSize: 10, fontWeight: 600, color: 'var(--t2)',
                textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 12,
                display: 'flex', alignItems: 'center', gap: 5,
              }}>
                <Icon name="ShieldCheck" size={11} color="var(--green)" />
                Reliability Assessment
              </div>
              {selectedPaper.reliability ? (
                <div style={{ fontSize: 12, color: 'var(--t1)', lineHeight: 1.7 }}>
                  {selectedPaper.reliability}
                </div>
              ) : (
                <div style={{ fontSize: 11, color: 'var(--t2)', fontStyle: 'italic', lineHeight: 1.65 }}>
                  Analyse this paper to generate a reliability assessment.
                </div>
              )}
            </div>

            {/* Column 2 (Middle) — AI Summary · Sparkles */}
            <div style={{
              flex: 1, overflowY: 'auto', padding: 16,
              borderRight: '1px solid var(--border)',
            }}>
              <div style={{
                fontFamily: 'monospace', fontSize: 10, fontWeight: 600, color: 'var(--t2)',
                textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 12,
                display: 'flex', alignItems: 'center', gap: 5,
              }}>
                <Icon name="Sparkles" size={11} color="var(--blue2)" />
                AI Summary

              {selectedPaper.summary ? (
                <MarkdownContent text={selectedPaper.summary} />

                <div style={{ fontSize: 11, color: 'var(--t2)', fontStyle: 'italic', lineHeight: 1.65 }}>

                </div>
              )}
            </div>

            <div style={{ width: 300, flexShrink: 0, overflowY: 'auto', padding: 16 }}>

                fontFamily: 'monospace', fontSize: 10, fontWeight: 600, color: 'var(--t2)',
                textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 12,
                display: 'flex', alignItems: 'center', gap: 5,

                <Icon name="FileText" size={11} color="var(--t2)" />
                File Info &amp; Topics

              <div style={{
                marginBottom: 12, padding: '10px 12px', background: 'var(--bg2)',
                border: '1px solid var(--border)', borderRadius: 'var(--radius)',
                fontSize: 11, fontFamily: 'monospace', color: 'var(--t2)',
                display: 'flex', flexDirection: 'column', gap: 4,

                <div><span style={{ color: 'var(--t1)' }}>Pages:</span> {selectedPaper.num_pages || '—'}</div>

                  fontFamily: 'monospace', fontSize: 10, fontWeight: 600, color: 'var(--t2)',

                }}>Team Annotations</div>
                {(selectedPaper.annotations || []).map(ann => (
                  <div key={ann.id} style={{
                    padding: '10px 12px', background: 'var(--bg2)',

                    marginBottom: 8, borderLeft: '3px solid rgba(37,99,235,.35)',
                  }}>

                      display: 'flex', justifyContent: 'space-between',

                    }}>

                      }}>

                          width: 16, height: 16, borderRadius: '50%',
                          background: avatarColor(ann.user),
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: 8, fontWeight: 700, color: '#fff',
                        }}>
                          {(ann.user || '?')[0].toUpperCase()}
                        </div>
                        {ann.user} · {ann.timestamp}
                      </div>
                      <button onClick={() => onDeleteAnnotation(ann.id)} style={{
                        background: 'transparent', border: 'none',

                      }}>&times;</button>
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--t1)', lineHeight: 1.65 }}>{ann.text}</div>
                  </div>

                      flex: 1, background: 'var(--bg2)', border: '1px solid var(--border)',

                    }} />

                    onClick={() => { onAddAnnotation(newAnnotation); setNewAnnotation(''); }}

            </div>
          </div>{/* end 3-column body */}

// ─── Chat ─────────────────────────────────────────────────────────────────────
function Chat({ project, username, chatLoading, onSend, useWebSearch, setUseWebSearch, a11y, t,
    feedbackSubmitted, onFeedback }) {
  const [msg, setMsg] = useState('');
  const scrollRef = useRef();
  const messages = project?.chat || [];

  useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },[messages]);

  const handleSend = () => { if(!msg.trim()||chatLoading) return; onSend(msg); setMsg(''); };

  const speakMsg = (text) => {
    // [RUBRIC B-E: TTS triggered on Volume2 click per spec]
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
  };

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Messages */}
      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'20px 24px',display:'flex',flexDirection:'column',gap:16}}>
        {messages.length === 0 && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            flex:1,gap:12,color:'var(--t2)'}}>
            <Icon name="MessageSquare" size={36} opacity={.4}/>
            <div style={{fontFamily:'var(--font-display)',fontSize:15,fontWeight:600,color:'var(--t1)'}}>Ask your papers anything</div>
            <div style={{fontSize:12,maxWidth:400,textAlign:'center',lineHeight:1.65}}>
              RAG-powered answers with source citations. Try: "What are the main contributions of these papers?"
            </div>
          </div>
        )}
        {messages.map((m,i)=>(
          <div key={i} style={{display:'flex',gap:12,animation:'msg-in .22s ease',
            flexDirection:m.type==='user'?'row-reverse':'row'}}>
            {/* [RUBRIC B-A: iMessage-style chat bubbles per spec] */}
            <div style={{width:32,height:32,minWidth:32,borderRadius:9,display:'flex',flexShrink:0,
              alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',
              background:m.type==='user'?avatarColor(m.user):'linear-gradient(135deg,var(--blue),var(--cyan))'}}>
              {m.type==='user'?initials(m.user):'N'}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:5,
                flexDirection:m.type==='user'?'row-reverse':'row'}}>
                <span style={{fontSize:12,fontWeight:600,color:m.type==='ai'?'var(--blue2)':'var(--t0)'}}>{m.type==='user'?m.user:'Nexus AI'}</span>
                <span style={{fontFamily:'monospace',fontSize:10,color:'var(--t2)'}}>{m.timestamp}</span>
                {/* [RUBRIC B-E: TTS Volume2 button per spec for each AI message] */}
                {m.type==='ai' && a11y.tts && (
                  <button onClick={()=>speakMsg(m.content)} style={{background:'transparent',border:'none',
                    color:'var(--t2)',cursor:'pointer',padding:2,marginLeft:4}}
                    title="Read aloud" /* [RUBRIC B-E: TTS synthesis triggered here] */>
                    <Icon name="Volume2" size={12}/>
                  </button>
                )}
              </div>
              {/* [RUBRIC B-A: bubble-user / bubble-ai for iMessage look per spec] */}
              <div className={m.type==='user'?'bubble-user':'bubble-ai'}
                style={{background:m.type==='user'?'var(--blue)':'var(--glass-bg)',
                  backdropFilter:m.type==='ai'?'var(--glass-blur)':'none',
                  border:'1px solid',borderColor:m.type==='user'?'transparent':'var(--glass-border)',
                  padding:'10px 14px',display:'inline-block',maxWidth:'85%'}}>
                {m.type==='ai' ? (
                  <div style={{fontSize:13,color:'var(--t1)',lineHeight:1.8}} dangerouslySetInnerHTML={md(m.content)}/>
                ) : (
                  <div style={{fontSize:13,color:'#fff',lineHeight:1.8}}>{m.content}</div>
                )}
                {/* [RUBRIC B-D: Citation pill-tags per spec] */}
                {m.citations?.length > 0 && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:8}}>
                    {m.citations.map((c,ci)=>(
                      <span key={ci}
                        /* [RUBRIC B-D: inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 per spec] */
                        style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',
                          borderRadius:999,fontSize:10,fontWeight:500,
                          background:'var(--blue-bg2)',color:'var(--blue3)',
                          border:'1px solid var(--glass-border)',cursor:'pointer',fontFamily:'monospace',
                          transition:'background .15s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='var(--blue-bg)'}
                        onMouseLeave={e=>e.currentTarget.style.background='var(--blue-bg2)'}>
                        📄 {c}
                      </span>
                    ))}
                  </div>
                )}
              </div>
              {/* Feedback for AI messages */}
              {m.type==='ai' && !feedbackSubmitted[`chat-${i}`] && (
                <div style={{marginTop:6,display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:10,color:'var(--t2)'}}>{t('rate_response')}:</span>
                  <StarRating value={0} onChange={r=>onFeedback('chat',`chat-${i}`,r,m.content)}/>
                </div>
              )}
              {feedbackSubmitted[`chat-${i}`] && (
                <div style={{marginTop:6,fontSize:10,color:'var(--green)',fontFamily:'monospace'}}>✓ {t('feedback_thanks')}</div>
              )}
            </div>
          </div>
        ))}
        {chatLoading && (
          <div style={{display:'flex',gap:12}}>
            <div style={{width:32,height:32,minWidth:32,borderRadius:9,display:'flex',
              alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#fff',
              background:'linear-gradient(135deg,var(--blue),var(--cyan))'}}>N</div>
            <div style={{background:'var(--glass-bg)',border:'1px solid var(--glass-border)',
              borderRadius:'4px 12px 12px 12px',padding:12,display:'flex',gap:5}}>
              {[0,.18,.36].map(d=>(
                <div key={d} style={{width:7,height:7,background:'var(--blue2)',borderRadius:'50%',
                  animation:`dot-bounce .9s ${d}s infinite`}}/>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Input bar */}
      <div style={{flexShrink:0,padding:'14px 20px',borderTop:'1px solid var(--border)',
        background:'var(--glass-bg)',backdropFilter:'var(--glass-blur)'}}>
        <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
          <textarea value={msg} onChange={e=>setMsg(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} }}
            placeholder={t('chat_placeholder')} rows={1}
            style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',
              borderRadius:10,padding:'10px 14px',color:'var(--t0)',fontFamily:'var(--font-body)',
              fontSize:13,resize:'none',minHeight:44,maxHeight:120,outline:'none',transition:'border-color .18s'}}
            onFocus={e=>e.target.style.borderColor='var(--blue)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}/>
          <Btn primary onClick={handleSend} disabled={!msg.trim()||chatLoading}>
            {chatLoading ? <span className="spinner"/> : <Icon name="Send" size={14}/>}
          </Btn>
        </div>
        <div style={{display:'flex',gap:16,marginTop:6,fontSize:10,color:'var(--t2)',fontFamily:'monospace',
          alignItems:'center'}}>
          <span>Enter to send · Shift+Enter for newline</span>
          <label style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer'}}>
            <input type="checkbox" checked={useWebSearch} onChange={e=>setUseWebSearch(e.target.checked)}
              style={{accentColor:'var(--blue)'}}/>
            Web search augmentation
          </label>
        </div>
      </div>
    </div>
  );
}

// ─── Insights ─────────────────────────────────────────────────────────────────

              textTransform:'uppercase',letterSpacing:'.08em'}}>Gap Analysis</div>

            </Btn>

              AI identifies unexplored areas and methodological gaps across all your papers.
              Upload and analyse at least 2 papers to run gap analysis.
            </div>

        {/* Paper Comparison */}
        <div style={{background:'var(--glass-bg)',border:'1px solid var(--border)',

          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>

                background:compareSelected.includes(hash)?'var(--blue-bg)':'transparent',
                transition:'all .15s'}}>
                <input type="checkbox" checked={compareSelected.includes(hash)}
                  onChange={e=>setCompareSelected(s=>e.target.checked?[...s,hash]:s.filter(x=>x!==hash))}
                  style={{accentColor:'var(--blue)'}}/>

                  textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title||p.file_name}</span>

  );
}

// ─── Upload Modal ──────────────────────────────────────────────────────────────
function UploadModal({ onClose, onUpload, uploadQueue }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();

  const handleDrop = (e) => { e.preventDefault(); setDragging(false);
    const files = Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.pdf'));
    if(files.length) onUpload(files); };

  return (
    <Modal onClose={onClose}>
      <div style={{padding:'22px 24px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700,color:'var(--t0)'}}>Upload PDFs</div>
        <div style={{fontSize:12,color:'var(--t1)',marginTop:4}}>Papers are auto-chunked and embedded into Pinecone</div>
      </div>
      <div style={{padding:'20px 24px'}}>
        <div className={`upload-zone ${dragging?'drag-over':''}`}
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={handleDrop}
          onClick={()=>inputRef.current?.click()}>
          <div style={{fontSize:28,marginBottom:10,opacity:.75}}>📄</div>
          <div style={{fontFamily:'var(--font-display)',fontSize:15,fontWeight:600,color:'var(--t0)',marginBottom:5}}>
            Drop PDFs here or click to browse
          </div>
          <div style={{fontSize:11,color:'var(--t2)'}}>PDF files only · Multiple files supported</div>
          <input ref={inputRef} type="file" accept=".pdf" multiple style={{display:'none'}}
            onChange={e=>{ onUpload(Array.from(e.target.files)); e.target.value=''; }}/>
        </div>
        {uploadQueue.length > 0 && (
          <div style={{marginTop:14,display:'flex',flexDirection:'column',gap:8}}>
            {uploadQueue.map((item,i)=>(
              <div key={i} style={{padding:'10px 12px',background:'var(--bg2)',border:'1px solid var(--border)',
                borderRadius:'var(--radius)'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12}}>
                  <span style={{color:'var(--t0)',fontWeight:500}}>{item.name}</span>
                  <span style={{color:'var(--t2)',fontFamily:'monospace',fontSize:10}}>{item.status}</span>
                </div>
                <div style={{height:3,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}}>
                  <div className="progress-fill" style={{height:'100%',width:`${item.pct}%`,borderRadius:2}}/>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
        <Btn ghost onClick={onClose}>Close</Btn>
      </div>
    </Modal>
  );
}

// ─── Create Project Modal ──────────────────────────────────────────────────────
function CreateProjectModal({ onClose, onCreate, username }) {
  const [form, setForm] = useState({ name:'', problem_statement:'', created_by:'' });
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if(!form.name||!form.problem_statement) return;
    setLoading(true);
    await onCreate({ ...form, created_by: form.created_by||username });
    setLoading(false);
  };

  return (
    <Modal onClose={onClose}>
      <div style={{padding:'22px 24px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700,color:'var(--t0)'}}>Create New Project</div>
        <div style={{fontSize:12,color:'var(--t1)',marginTop:4}}>Start a collaborative research workspace</div>
      </div>
      <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:14}}>
        {[
          { key:'name', label:'Project Name *', placeholder:'e.g. Transformer Architecture Survey' },
          { key:'problem_statement', label:'Research Problem *', placeholder:'What research problem are you solving?', multi:true },
          { key:'created_by', label:'Your Name (optional)', placeholder:username||'Your name…' },
        ].map(f=>(
          <div key={f.key}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--t1)',marginBottom:5,fontFamily:'monospace',
              letterSpacing:'.04em'}}>{f.label}</div>
            {f.multi ? (
              <textarea value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}
                placeholder={f.placeholder} rows={3}
                style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',
                  borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--t0)',
                  fontFamily:'var(--font-body)',fontSize:13,resize:'vertical',outline:'none'}}/>
            ) : (
              <input value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}
                placeholder={f.placeholder}
                style={{width:'100%',background:'var(--bg2)',border:'1px solid var(--border)',
                  borderRadius:'var(--radius)',padding:'8px 12px',color:'var(--t0)',
                  fontFamily:'var(--font-body)',fontSize:13,outline:'none'}}/>
            )}
          </div>
        ))}
      </div>
      <div style={{padding:'14px 24px',borderTop:'1px solid var(--border)',display:'flex',gap:8,justifyContent:'flex-end'}}>
        <Btn ghost onClick={onClose}>Cancel</Btn>
        <Btn primary onClick={submit} disabled={!form.name||!form.problem_statement||loading}>
          {loading?<><span className="spinner"/> Creating…</>:'Create Project →'}
        </Btn>
      </div>
    </Modal>
  );
}
